<body>
    <h1>LOCAL CLINIC HEALTH</h1>
<header>
<img src="logo 1.png" controls width="150" height="150">

<button><a href="Dashboard.html">Dashboard</a></button>&nbsp&nbsp&nbsp

</header>


<div class="container">
    <h2>Patient Check-in</h2>

    <form id="checkinForm">
        <input type="text" placeholder="Full Name" id="name" required><br><br>
        <input type="date" id="dob" required><br><br>

        <select id="gender">
            <option>Male</option>
            <option>Female</option>
        </select><br><br>

        <input type="text" placeholder="Phone Number" id="phone"><br><br>
        <input type="text" placeholder="Address" id="address"><br><br>

        <input type="text" placeholder="Reason for Visit" id="reason"><br><br>
        
        <select id="department">
            <option>OPD</option>
            <option>Maternity</option>
            <option>Pediatrics</option>
        </select><br><br>

        <select id="payment">
            <option>Cash</option>
            <option>Insurance</option>
            <option>Mobile Money</option>
        </select><br><br>

        <button type="submit">Check-in</button>
    </form>

    <h3>Patients List</h3>
    <ul id="patientList"></ul>
</div>

<script src="script.js">
document.getElementById("checkinForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value;
    let reason = document.getElementById("reason").value;

    let patient = {
        name: name,
        reason: reason,
        time: new Date().toLocaleTimeString()
    };

    savePatient(patient);
    displayPatients();

    this.reset();
});

function savePatient(patient) {
    let patients = JSON.parse(localStorage.getItem("patients")) || [];
    patients.push(patient);
    localStorage.setItem("patients", JSON.stringify(patients));
}

function displayPatients() {
    let list = document.getElementById("patientList");
    list.innerHTML = "";

    let patients = JSON.parse(localStorage.getItem("patients")) || [];

    patients.forEach(p => {
        let li = document.createElement("li");
        li.textContent = p.name + " - " + p.reason + " (" + p.time + ")";
        list.appendChild(li);
    });
}

// load data igihe page ifunguwe
displayPatients();
</script>
</body></html>
