<!DOCTYPE html>
<html>
    <head>                                                                                                                           
    <title>Currency Converter</title>

    <link href="kevin.css" rel="stylesheet">

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background: linear-gradient(to right,#0f2027,#203a43,#2c5364);
            color:white;
        }

        nav{
            display:flex;
            gap:10px;
            justify-content:center;
            padding:10px;
            background:rgba(0,0,0,0.4);
            flex-wrap:wrap;
        }                                                      

        nav a{                                                         
            text-decoration:none;
            color:white;
            background:#00ffd5;
            padding:10px 15px;
            border-radius:6px;
            font-weight:bold;
        }

        nav a:hover{
            background:#00bfa6;
        }

        .container{
            max-width:900px;
            margin:auto;
            padding:20px;
        }

        .page-header{
            text-align:center;
            margin-bottom:20px;
        }

        .converter-card{
            background:rgba(255,255,255,0.08);
            padding:20px;
            border-radius:12px;
            box-shadow:0 0 10px rgba(0,0,0,0.3);
        }

        label{
            display:block;
            margin-top:10px;
            margin-bottom:5px;
        }

        input,select{
            width:100%;
            padding:10px;
            border-radius:6px;
            border:none;
        }

        button{
            margin-top:15px;
            padding:12px;
            width:100%;
            background:#00ffd5;
            border:none;
            border-radius:6px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#00bfa6;
        }

        .result{
            margin-top:15px;
            font-size:20px;
            text-align:center;
        }
    </style>
</head>

<body>

<header style="text-align:center;padding:10px;">
    <img src="dot.png" width="80" height="80">
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="converter.html">Full Converter</a>
    <a href="details.html">Currency Details</a>
    <a href="history.html">History</a>
    <a href="settings.html">Settings</a>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Currency Converter</h1>
        <p>Convert currencies quickly and easily</p>
    </div>

    <div class="converter-card">
        <label>Amount</label>

        <input type="number" id="amount" value="numbers" plaseholder="enter number">
        

        <label>From</label>
        <select id="fromCurrency">
            <option value="USD">USD - US Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="RWF">RWF - Rwandan Franc</option>
        </select>

        <label>To</label>
        <select id="toCurrency">
            <option value="RWF">RWF - Rwandan Franc</option>
            <option value="USD">USD - US Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
        </select>

        <button onclick="convertCurrency()">Convert Now</button>

        <div class="result" id="result">Result is this                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 </div>
    </div>
</div>

<script>
function convertCurrency(){
    let amount = parseFloat(document.getElementById('amount').value);
    let from = document.getElementById('fromCurrency').value;
    let to = document.getElementById('toCurrency').value;

    // simple fixed rates (demo)
    let rates = {
        USD:1,
        EUR:0.92,
        GBP:0.78,
        RWF:1300
    };

    let usdAmount = amount / rates[from];
    let result = usdAmount * rates[to];

    document.getElementById('result').innerHTML =
        amount + " " + from + " = " + result.toFixed(2) + " " + to;
}
</script>

</body>
</html>
