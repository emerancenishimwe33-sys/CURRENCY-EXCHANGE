<!DOCTYPE html>
<html>
<head>
<title>SETTINGS PAGE</title>

<style>
body{
margin:0;
font-family:Arial;
background: linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
transition:0.3s;
}

header{
background:rgb(61, 60, 55);
padding:15px;
}

nav{
background:black;
padding:15px;
}

nav a{
color:rgb(90, 156, 84);
margin:10px;
text-decoration:none;
font-weight:bold;
}

.box{
background:goldenrod;
width:350px;
margin:auto;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.section{
background:black;
padding:15px;
margin:10px 0;
border-radius:8px;
}

button{
width:90%;
padding:10px;
margin:5px;
border:none;
border-radius:5px;
background:black;
color:white;
cursor:pointer;
}
body.dark{
background:white;
color:black;
}

body.dark .box{
background:olive;
color:white;
}

body.dark nav{
background:#222;
}

body.dark header{
background:#333;
}

body.dark .section{
background:#444;
color:white;
}

footer{
background:olive;
padding:20px;
margin-top:20px;
text-align:center;
}
</style>

</head>

<body>

<header>
<h1>SETTINGS PAGE</h1>
</header>


<div class="box">

<h2>System Settings</h2>

<div class="section">
<h3>Dark / Light Mode</h3>
<button onclick="toggleDarkMode()">🌙 Toggle Mode</button>
</div>

<div class="section">
<h3>Default Currency</h3>
<select>
<option>USD</option>
<option>RWF</option>
<option>EUR</option>
<option>GBP</option>
</select>
</div>

<div class="section">
<h3>Language</h3>
<select>
<option>English</option>
<option>Kinyarwanda</option>
<option>French</option>
</select>
</div>

</div>

<footer>
© Emerance Nishimwe
</footer>

<script>
function toggleDarkMode(){
document.body.classList.toggle("dark");

if(document.body.classList.contains("dark")){
localStorage.setItem("mode","dark");
}else{
localStorage.setItem("mode","light");
}
}
window.onload=function(){
if(localStorage.getItem("mode")==="dark"){
document.body.classList.add("dark");
}
}
</script>

</body>
</html>
